name: windows-smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  windows-host-smoke:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run CI test entrypoint
        run: npm run ci

      - name: Verify Windows named-pipe ACL
        shell: pwsh
        run: ./tests/windows-pipe-acl.ps1
